<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Source Code Analyser</title>
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <div class="app-wrapper">

    <!-- Header -->
    <div class="app-header">
      <div class="header-icon"><i class="fas fa-code"></i></div>
      <div class="header-text">
        <span class="header-title">Source Code Analyser</span>
        <span class="header-sub">Powered by GPT + LangChain</span>
      </div>
      <div id="status-badge" class="status-badge idle">No repo loaded</div>
    </div>

    <!-- Repo Input -->
    <div class="repo-section">
      <div class="repo-input-row">
        <div class="repo-icon"><i class="fab fa-github"></i></div>
        <input
          type="text"
          id="repo-url"
          placeholder="Paste a GitHub repository URL (e.g. https://github.com/user/repo)"
          autocomplete="off"
        />
        <button id="load-btn"><i class="fas fa-download"></i> Load Repo</button>
      </div>
      <div id="repo-status" class="repo-status"></div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chat-area">
      <div class="welcome-msg" id="welcome-msg">
        <i class="fas fa-robot welcome-icon"></i>
        <p>Load a GitHub repository above, then ask questions about the code.</p>
        <p class="welcome-examples">Try: <em>"What does this repo do?"</em> · <em>"Explain the main entry point"</em> · <em>"How is authentication handled?"</em></p>
      </div>
    </div>

    <!-- Chat Input -->
    <div class="chat-footer">
      <form id="chat-form">
        <input
          type="text"
          id="msg-input"
          name="msg"
          placeholder="Ask a question about the code..."
          autocomplete="off"
          disabled
        />
        <button type="submit" id="send-btn" disabled>
          <i class="fas fa-paper-plane"></i>
        </button>
      </form>
      <p class="footer-hint">Type <strong>clear</strong> to remove the loaded repository.</p>
    </div>

  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script>
    function getTime() {
      const d = new Date();
      return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    }

    function appendMessage(text, role) {
      $('#welcome-msg').hide();
      const time = getTime();
      const isUser = role === 'user';
      const icon = isUser
        ? '<i class="fas fa-user"></i>'
        : '<i class="fas fa-code"></i>';
      const content = isUser
        ? escapeHtml(text)
        : formatCode(text);

      const html = `
        <div class="msg-row ${role}">
          <div class="avatar">${icon}</div>
          <div class="bubble">
            <div class="bubble-content">${content}</div>
            <span class="msg-time">${time}</span>
          </div>
        </div>`;
      $('#chat-area').append(html);
      scrollToBottom();
    }

    function appendThinking() {
      $('#welcome-msg').hide();
      const html = `<div class="msg-row bot" id="thinking-msg">
        <div class="avatar"><i class="fas fa-code"></i></div>
        <div class="bubble"><div class="bubble-content thinking-dots"><span></span><span></span><span></span></div></div>
      </div>`;
      $('#chat-area').append(html);
      scrollToBottom();
    }

    function scrollToBottom() {
      const area = document.getElementById('chat-area');
      area.scrollTop = area.scrollHeight;
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatCode(text) {
      // Wrap triple-backtick blocks in <pre><code>
      return escapeHtml(text).replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
        return `<pre><code class="lang-${lang || 'text'}">${code.trim()}</code></pre>`;
      }).replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>')
        .replace(/\n/g, '<br>');
    }

    function setStatus(text, type) {
      $('#status-badge').text(text).attr('class', 'status-badge ' + type);
    }

    // Load repo
    $('#load-btn').on('click', function () {
      const url = $('#repo-url').val().trim();
      if (!url) return;

      $('#load-btn').prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> Loading...');
      $('#repo-status').text('Cloning and indexing repository — this may take a minute...').addClass('loading');
      setStatus('Indexing...', 'loading');

      $.ajax({
        type: 'POST',
        url: '/chatbot',
        data: { question: url },
        success: function () {
          $('#repo-status').text('Repository loaded and indexed. You can now ask questions.').removeClass('loading').addClass('success');
          setStatus('Repo ready', 'ready');
          $('#msg-input').prop('disabled', false);
          $('#send-btn').prop('disabled', false);
          $('#msg-input').focus();
        },
        error: function () {
          $('#repo-status').text('Failed to load repository. Check the URL and try again.').removeClass('loading').addClass('error');
          setStatus('Error', 'error');
        },
        complete: function () {
          $('#load-btn').prop('disabled', false).html('<i class="fas fa-download"></i> Load Repo');
        }
      });
    });

    // Send enter key on repo input
    $('#repo-url').on('keydown', function (e) {
      if (e.key === 'Enter') $('#load-btn').click();
    });

    // Chat submit
    $('#chat-form').on('submit', function (e) {
      e.preventDefault();
      const msg = $('#msg-input').val().trim();
      if (!msg) return;

      appendMessage(msg, 'user');
      $('#msg-input').val('');
      $('#send-btn').prop('disabled', true);
      appendThinking();

      if (msg.toLowerCase() === 'clear') {
        $('#thinking-msg').remove();
        appendMessage('Repository cleared.', 'bot');
        $('#msg-input').prop('disabled', true);
        $('#send-btn').prop('disabled', true);
        setStatus('No repo loaded', 'idle');
        $('#repo-status').text('').removeClass('success error loading');
        $('#repo-url').val('');
        $.post('/get', { msg: msg });
        return;
      }

      $.ajax({
        type: 'POST',
        url: '/get',
        data: { msg: msg },
        success: function (data) {
          $('#thinking-msg').remove();
          appendMessage(data, 'bot');
        },
        error: function () {
          $('#thinking-msg').remove();
          appendMessage('Error: Could not get a response.', 'bot');
        },
        complete: function () {
          $('#send-btn').prop('disabled', false);
          $('#msg-input').focus();
        }
      });
    });
  </script>

</body>
</html>
