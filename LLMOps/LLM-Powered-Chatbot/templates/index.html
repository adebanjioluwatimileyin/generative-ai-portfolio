<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #0f1117;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      background-color: #1a1a2e;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      width: 90%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      height: 80vh;
      overflow: hidden;
    }

    .header {
      background-color: #16213e;
      color: #fff;
      padding: 18px 24px;
      font-size: 1.1rem;
      font-weight: 600;
      border-bottom: 1px solid #2d2d4e;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header span.dot {
      width: 10px;
      height: 10px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      background-color: #4f46e5;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      background-color: #252540;
      color: #e2e8f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.thinking {
      background-color: #252540;
      color: #6b7280;
      align-self: flex-start;
      font-style: italic;
    }

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #2d2d4e;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #user-input {
      flex: 1;
      background-color: #252540;
      border: 1px solid #3d3d6b;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #user-input:focus {
      border-color: #4f46e5;
    }

    #user-input::placeholder { color: #6b7280; }

    #submitBtn {
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 0.92rem;
      font-weight: 600;
      transition: background-color 0.2s;
      white-space: nowrap;
    }

    #submitBtn:hover { background-color: #4338ca; }
    #submitBtn:disabled { background-color: #374151; cursor: not-allowed; }

    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #3d3d6b; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="header">
      <span class="dot"></span>
      Gemini 1.5 Flash Chatbot
    </div>

    <div class="messages" id="messages">
      <div class="message bot">Hello! I'm powered by Gemini 1.5 Flash. How can I help you today?</div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="user-input"
        placeholder="Type your message..."
        autocomplete="off"
      />
      <button id="submitBtn">Send</button>
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById("messages");
    const userInput = document.getElementById("user-input");
    const submitBtn = document.getElementById("submitBtn");

    function appendMessage(text, role) {
      const div = document.createElement("div");
      div.className = "message " + role;
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      appendMessage(text, "user");
      userInput.value = "";
      submitBtn.disabled = true;

      const thinking = appendMessage("Thinking...", "thinking");

      try {
        const res = await fetch(`/gemini?user_input=${encodeURIComponent(text)}`);
        const data = await res.json();
        thinking.remove();
        appendMessage(data.content, "bot");
      } catch (err) {
        thinking.remove();
        appendMessage("Error: Could not reach the server.", "bot");
      } finally {
        submitBtn.disabled = false;
        userInput.focus();
      }
    }

    submitBtn.addEventListener("click", sendMessage);
    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
